spec_version: "1.0"
name: "sentinel_soc"
description: "SentinelSOC: Autonomous Cyber-Defense Command Center. An agentic environment challenging AI analysts to triage, investigate, and mitigate high-stakes cyber security incidents (Ransomware, DDoS, Phishing) using real-world threat intelligence playbooks."
version: "2.0.0"
type: "space"
runtime: "fastapi"
app: "server.app:app"
port: 7860
benchmark_id: "sentinel_soc_v1"

# Terminal Operations Definitions
tasks:
  - id: "easy"
    description: >
      Level-1 Alerts: Single-vector incidents (Failed logins, suspicious emails) requiring 
      standard triage and routing to the Security Response team.
    difficulty: "easy"
    max_steps: 10

  - id: "medium"
    description: >
      Level-2 Alerts: Multi-step investigations requiring Threat Intel (KB) retrieval
      to identify specific attack patterns like SQL Injection probes or massive traffic spikes.
    difficulty: "medium"
    max_steps: 10

  - id: "hard"
    description: >
      Critical Incidents: High-severity threats (Ransomware, Data Exfiltration, Bypassed Firewalls)
      requiring multiple intelligence searches and detailed containment reports.
      Grader validates playbook adherence and report quality.
    difficulty: "hard"
    max_steps: 10

# Deployment Metadata
metadata:
  domain: "Cybersecurity / Security Operations Center (SOC)"
  complexity: "Advanced Autonomous Agent Task"
  real_world_use_case: >
    Autonomous L1 SOC triage and incident mitigation for enterprise cyber-defenses.
  version: "2.0.0"
  last_updated: "2026-04"
  tags:
    - openenv
    - reinforcement-learning
    - cybersecurity
    - agentic-ai
    - soc-analyst
    - enterprise-defense
